<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1240" viewBox="0 0 1480 1240" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      .stage     { fill:#eef2f7; }
      .stageAlt  { fill:#f1f5f9; }
      .stageLbl  { fill:#64748b; font-size:15px; font-weight:700; letter-spacing:1.5px; }
      .s1        { fill:#dbe5f3; stroke:#5b7db1; stroke-width:1.5; }
      .s2        { fill:#fde8cd; stroke:#e8943a; stroke-width:2; }
      .neu       { fill:#e7edf5; stroke:#7d93b3; stroke-width:1.5; }
      .pill      { fill:#f7c98a; stroke:#e8943a; stroke-width:1.2; }
      .h1blue    { fill:#1e3a5f; font-size:18px; font-weight:800; }
      .h1or      { fill:#b3611a; font-size:18px; font-weight:800; }
      .body      { fill:#33425a; font-size:13.5px; }
      .bodyor    { fill:#8a4d16; font-size:13.5px; }
      .pillt     { fill:#7a3d0c; font-size:13px; font-weight:700; }
      .line      { stroke:#64748b; stroke-width:2.5; fill:none; }
      .lineor    { stroke:#e8943a; stroke-width:2.5; fill:none; }
      .edgelbl   { fill:#7c8aa0; font-size:12px; font-style:italic; }
      .ttl       { fill:#0f172a; font-size:30px; font-weight:800; }
      .sub       { fill:#5b6b82; font-size:16px; }
      .ver       { fill:#b3611a; font-size:13px; font-weight:800; }
    </style>
  </defs>

  <!-- Title -->
  <text x="30" y="46" class="ttl">SmartShield IPS — System Architecture</text>
  <text x="30" y="74" class="sub">Behavioral ML-based OT/ICS Intrusion Prevention System · built on Stratosphere Linux IPS (SLIPS), GPL-2.0</text>

  <!-- Legend -->
  <g transform="translate(1086,18)">
    <rect x="0" y="0" width="372" height="64" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1"/>
    <rect x="16" y="14" width="20" height="14" rx="3" class="s1"/>
    <text x="44" y="26" class="body">Semester 1 — inherited from SLIPS (upstream)</text>
    <rect x="16" y="38" width="20" height="14" rx="3" class="s2"/>
    <text x="44" y="50" class="body">Semester 2 — our contribution (OT layer + hardening)</text>
  </g>
  <rect x="1086" y="90" width="372" height="22" rx="6" fill="#fff4e6" stroke="#e8943a" stroke-width="1"/>
  <text x="1272" y="105" text-anchor="middle" class="ver">FACTORY EDITION · v1.1.16 · Zeek 8 · Redis 8.x</text>

  <!-- ===== Stage 1: TRAFFIC INPUT ===== -->
  <rect x="20" y="120" width="1440" height="120" rx="10" class="stage"/>
  <text x="40" y="146" class="stageLbl">1 · TRAFFIC INPUT</text>
  <g transform="translate(150,156)">
    <rect class="s1" width="210" height="68" rx="9"/>
    <text x="105" y="28" text-anchor="middle" class="h1blue">PCAP files</text>
    <text x="105" y="50" text-anchor="middle" class="body">offline capture replay</text>
  </g>
  <g transform="translate(390,156)">
    <rect class="s1" width="210" height="68" rx="9"/>
    <text x="105" y="28" text-anchor="middle" class="h1blue">Flow / log inputs</text>
    <text x="105" y="50" text-anchor="middle" class="body">Zeek dir · Argus · Suricata · nfdump</text>
  </g>
  <g transform="translate(630,156)">
    <rect class="s2" width="300" height="68" rx="9"/>
    <text x="150" y="26" text-anchor="middle" class="h1or">Live SPAN / TAP capture (eth1)</text>
    <text x="150" y="46" text-anchor="middle" class="bodyor">passive mirror at IT/OT boundary — no IP,</text>
    <text x="150" y="61" text-anchor="middle" class="bodyor">OT devices never see the sensor</text>
  </g>

  <!-- ===== Stage 2: CAPTURE & PARSING ===== -->
  <rect x="20" y="256" width="1440" height="130" rx="10" class="stageAlt"/>
  <text x="40" y="282" class="stageLbl">2 · CAPTURE &amp; PARSING</text>
  <g transform="translate(150,292)">
    <rect class="s1" width="230" height="80" rx="9"/>
    <text x="115" y="28" text-anchor="middle" class="h1blue">Zeek 8 engine</text>
    <text x="115" y="50" text-anchor="middle" class="body">packets → conn.log, dns.log,</text>
    <text x="115" y="67" text-anchor="middle" class="body">ssl.log, http.log, notice.log …</text>
  </g>
  <g transform="translate(410,292)">
    <rect class="s1" width="230" height="80" rx="9"/>
    <text x="115" y="28" text-anchor="middle" class="h1blue">SLIPS Zeek scripts</text>
    <text x="115" y="50" text-anchor="middle" class="body">JA3/JA3S · ARP · ICMP scans</text>
    <text x="115" y="67" text-anchor="middle" class="body">DoH detection · GeoIP (MMDB)</text>
  </g>
  <g transform="translate(670,292)">
    <rect class="s2" width="280" height="80" rx="9"/>
    <text x="140" y="26" text-anchor="middle" class="h1or">ot_protocols.zeek</text>
    <text x="140" y="46" text-anchor="middle" class="bodyor">Modbus · DNP3 · S7Comm</text>
    <text x="140" y="62" text-anchor="middle" class="bodyor">PROFINET-DCP · CIP · PTP/NTP</text>
    <text x="140" y="76" text-anchor="middle" class="bodyor">emits OT events + Notice types</text>
  </g>

  <!-- ===== Stage 3: CORE & MESSAGE BUS ===== -->
  <rect x="20" y="402" width="1440" height="150" rx="10" class="stage"/>
  <text x="40" y="428" class="stageLbl">3 · CORE &amp; MESSAGE BUS</text>
  <g transform="translate(150,438)">
    <rect class="s1" width="230" height="96" rx="9"/>
    <text x="115" y="28" text-anchor="middle" class="h1blue">Profiler</text>
    <text x="115" y="50" text-anchor="middle" class="body">builds profiles &amp; time-windows</text>
    <text x="115" y="67" text-anchor="middle" class="body">publishes per-protocol flows</text>
  </g>
  <g transform="translate(410,438)">
    <rect class="s1" width="330" height="96" rx="9"/>
    <text x="165" y="26" text-anchor="middle" class="h1blue">Redis pub/sub (IPC bus)</text>
    <text x="165" y="46" text-anchor="middle" class="body">channels: new_flow, new_notice, new_arp …</text>
    <rect x="16" y="56" width="298" height="28" rx="6" class="pill"/>
    <text x="165" y="75" text-anchor="middle" class="pillt">+ new_modbus · new_s7comm · new_dnp3</text>
  </g>
  <g transform="translate(770,438)">
    <rect class="neu" width="280" height="96" rx="9"/>
    <text x="140" y="28" text-anchor="middle" class="h1blue">State storage</text>
    <text x="140" y="50" text-anchor="middle" class="body">Redis (live) · SQLite (history)</text>
    <rect x="16" y="60" width="248" height="24" rx="6" class="pill"/>
    <text x="140" y="77" text-anchor="middle" class="pillt">+ AOF/RDB persistence</text>
  </g>

  <!-- ===== Stage 4: DETECTION MODULES ===== -->
  <rect x="20" y="568" width="1440" height="200" rx="10" class="stageAlt"/>
  <text x="40" y="594" class="stageLbl">4 · DETECTION MODULES</text>
  <g transform="translate(150,604)">
    <rect class="s1" width="200" height="40" rx="8"/>
    <text x="100" y="25" text-anchor="middle" class="h1blue" font-size="15">Threat Intelligence</text>
  </g>
  <g transform="translate(370,604)">
    <rect class="s1" width="160" height="40" rx="8"/>
    <text x="80" y="25" text-anchor="middle" class="h1blue" font-size="15">PortScan</text>
  </g>
  <g transform="translate(550,604)">
    <rect class="s1" width="190" height="40" rx="8"/>
    <text x="95" y="25" text-anchor="middle" class="h1blue" font-size="15">RNN C&amp;C detection</text>
  </g>
  <g transform="translate(150,654)">
    <rect class="s1" width="200" height="40" rx="8"/>
    <text x="100" y="25" text-anchor="middle" class="h1blue" font-size="15">Flow Alerts</text>
  </g>
  <g transform="translate(370,654)">
    <rect class="s1" width="160" height="40" rx="8"/>
    <text x="80" y="25" text-anchor="middle" class="h1blue" font-size="15">HTTP Analyzer</text>
  </g>
  <g transform="translate(550,654)">
    <rect class="s1" width="190" height="40" rx="8"/>
    <text x="95" y="25" text-anchor="middle" class="h1blue" font-size="15">ARP · Leak · IP Info</text>
  </g>
  <text x="150" y="722" class="body" font-style="italic">+ Network Discovery, Update Manager, VirusTotal (all from upstream SLIPS)</text>

  <g transform="translate(770,604)">
    <rect class="s2" width="540" height="146" rx="9"/>
    <text x="270" y="28" text-anchor="middle" class="h1or">OT Detection module</text>
    <text x="270" y="50" text-anchor="middle" class="bodyor" font-weight="700">19 OT/ICS attack types · 6 protocols</text>
    <text x="270" y="70" text-anchor="middle" class="bodyor">Modbus flood / illegal func / write-coil · S7 STOP · DNP3</text>
    <text x="270" y="86" text-anchor="middle" class="bodyor">PLC mode-switch · valve/motor cycling · PTP/NTP spoof</text>
    <text x="270" y="106" text-anchor="middle" class="bodyor">sliding-window + single-connection volumetric flood detection</text>
    <text x="270" y="122" text-anchor="middle" class="bodyor">dedup · separate S7 &amp; Modbus authorized-master lists</text>
    <text x="270" y="138" text-anchor="middle" class="bodyor">protected-device checks (OT-safe)</text>
  </g>

  <!-- ===== Stage 5: EVIDENCE & ALERT PIPELINE ===== -->
  <rect x="20" y="784" width="1440" height="104" rx="10" class="stage"/>
  <text x="40" y="810" class="stageLbl">5 · EVIDENCE &amp; ALERT PIPELINE</text>
  <g transform="translate(240,820)">
    <rect class="s1" width="1000" height="58" rx="9"/>
    <text x="500" y="26" text-anchor="middle" class="h1blue">Evidence handler → threshold evaluation → alert handler → alerts.json</text>
    <text x="500" y="48" text-anchor="middle" class="body">accumulates weighted evidence per profile/time-window; OT evidence carries 0.85–0.95 confidence; threshold lowered to 0.15 for OT</text>
  </g>

  <!-- ===== Stage 6: RESPONSE & OUTPUT ===== -->
  <rect x="20" y="904" width="1440" height="190" rx="10" class="stageAlt"/>
  <text x="40" y="930" class="stageLbl">6 · RESPONSE &amp; OUTPUT</text>
  <g transform="translate(120,944)">
    <rect class="s2" width="260" height="130" rx="9"/>
    <text x="130" y="28" text-anchor="middle" class="h1or">Blocking module</text>
    <text x="130" y="50" text-anchor="middle" class="bodyor">iptables auto-block of attackers</text>
    <rect x="16" y="64" width="228" height="50" rx="6" class="pill"/>
    <text x="130" y="84" text-anchor="middle" class="pillt">OT-SAFE: PLC / HMI / SCADA</text>
    <text x="130" y="103" text-anchor="middle" class="pillt">IPs are never blocked</text>
  </g>
  <g transform="translate(400,944)">
    <rect class="s1" width="280" height="130" rx="9"/>
    <text x="140" y="28" text-anchor="middle" class="h1blue">Alert export</text>
    <text x="140" y="50" text-anchor="middle" class="body">Slack · STIX/TAXII (upstream)</text>
    <rect x="16" y="64" width="248" height="50" rx="6" class="pill"/>
    <text x="140" y="84" text-anchor="middle" class="pillt">+ Syslog (RFC-5424) · HTTP webhook</text>
    <text x="140" y="103" text-anchor="middle" class="pillt">→ SIEM (Splunk / Elastic / Graylog)</text>
  </g>
  <g transform="translate(700,944)">
    <rect class="s1" width="300" height="130" rx="9"/>
    <text x="150" y="28" text-anchor="middle" class="h1blue">Web interface</text>
    <text x="150" y="50" text-anchor="middle" class="body">Flask dashboard · profiles, alerts,</text>
    <text x="150" y="67" text-anchor="middle" class="body">evidence, timeline (port 55000)</text>
    <rect x="16" y="80" width="268" height="34" rx="6" class="pill"/>
    <text x="150" y="102" text-anchor="middle" class="pillt">+ login &amp; session auth</text>
  </g>
  <g transform="translate(1020,944)">
    <rect class="s1" width="320" height="130" rx="9"/>
    <text x="160" y="28" text-anchor="middle" class="h1blue">Kalipso TUI</text>
    <text x="160" y="54" text-anchor="middle" class="body">terminal dashboard</text>
    <text x="160" y="74" text-anchor="middle" class="body">(Node.js / blessed)</text>
    <text x="160" y="100" text-anchor="middle" class="body" font-style="italic">upstream SLIPS</text>
  </g>

  <!-- ============ CONNECTORS ============ -->
  <!-- Stage1 -> Stage2 -->
  <path class="line" d="M255 224 L255 256 L265 256 L265 292"/>
  <path class="line" d="M495 224 L495 256 L525 256 L525 292"/>
  <path class="line" d="M495 224 L495 256 L265 256" />
  <path class="lineor" d="M780 224 L780 256 L810 256 L810 292"/>

  <!-- Stage2 -> Stage3 (bus) -->
  <path class="line" d="M265 372 L265 402 L420 402 L420 438" />
  <path class="line" d="M525 372 L525 402 L560 402 L560 438" />
  <path class="lineor" d="M810 372 L810 402 L575 402 L575 438" />
  <text x="590" y="396" class="edgelbl">OT logs → profiler</text>
  <!-- profiler -> bus -->
  <path class="line" d="M380 486 L410 486" />

  <!-- Stage3 bus -> Stage4 -->
  <path class="line" d="M455 534 L455 552 L450 552 L450 604" />
  <text x="380" y="582" class="edgelbl">subscribe</text>
  <path class="lineor" d="M700 534 L700 552 L900 552 L900 604" />
  <text x="780" y="582" class="edgelbl" fill="#b3611a">new_modbus / s7comm / dnp3</text>

  <!-- Stage4 -> Stage5 -->
  <path class="line" d="M450 694 L450 784" />
  <path class="lineor" d="M1040 750 L1040 770 L900 770 L900 784" />

  <!-- Stage5 -> Stage6 -->
  <path class="line" d="M450 878 L450 904 L250 904 L250 944" />
  <path class="line" d="M620 878 L620 904 L540 904 L540 944" />
  <path class="line" d="M820 878 L820 904 L850 904 L850 944" />
  <path class="line" d="M980 878 L980 904 L1180 904 L1180 944" />

  <!-- Footer -->
  <text x="30" y="1128" class="body" fill="#7c8aa0">Team: Mostafa Hamada · Zeyad Magdy · Ahmed Ashraf · Karim Walid — Supervisor: Dr. Islam El-Maddah · Derivative of SLIPS © Stratosphere Lab, CTU Prague (GPL-2.0)</text>
  <text x="30" y="1150" class="body" fill="#9aa7ba" font-style="italic">New in v1.1.16: single-connection volumetric flood detection · dedicated S7 authorized-master list · Zeek 8 / Redis 8.x base · upstream security &amp; speed fixes</text>
</svg>
