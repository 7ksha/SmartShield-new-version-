# OT Protected Devices Configuration
# ===================================
# List IP addresses or CIDR ranges of OT/ICS devices that must NEVER be
# auto-blocked by the Blocking module.  Only evidence/alerts are generated.
#
# These are your critical industrial assets:
#   - PLCs (Programmable Logic Controllers)
#   - HMIs (Human-Machine Interfaces)
#   - SCADA servers
#   - RTUs (Remote Terminal Units)
#   - Safety instrumented systems
#   - Historian servers
#
# Format: one IP or CIDR per line. Lines starting with # are comments.
# Examples:
#   192.168.1.100
#   10.0.0.0/24
#   172.16.5.50

# Siemens S7 PLC
# 192.168.1.100

# Schneider Modicon PLC
# 192.168.1.101

# HMI Panel
# 192.168.1.200

# SCADA Server
# 192.168.1.10
