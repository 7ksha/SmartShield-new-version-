# Authorized S7 Masters Configuration
# ======================================
# List IP addresses that are allowed to initiate S7Comm/ISO-TSAP connections.
# Any S7 connection from an IP NOT in this list targeting a protected
# OT device will generate an "Unauthorized S7 Access" alert.
#
# These are your legitimate S7 clients:
#   - TIA Portal engineering stations
#   - SCADA servers with S7 drivers
#   - WinCC HMI systems
#
# Format: one IP per line. Lines starting with # are comments.
# Leave this file empty (all comments) to disable unauthorized-access detection.
# If this file does not exist, the OT module falls back to using the
# modbus_authorized_masters.conf list for S7 as well.

